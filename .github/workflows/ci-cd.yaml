name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-deploy:
    name: Build, Test & Deploy
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: redapro
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: redapro
      SECRET: ${{ secrets.SECRET }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      DB_SSL: ${{ secrets.DB_SSL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres
        run: |
          echo "Aguardando Postgres iniciar..."
          sleep 10

      - name: Run tests
        run: npm test -- --ci --runInBand

      - name: Build Docker image
        run: docker build -t redapro-backend:${{ github.sha }} .

      - name: Deploy to Supabase
        run: |
          echo "Logando no Supabase CLI..."
          npx supabase login --service-role $SUPABASE_KEY

          echo "Deploy da aplicação..."
          npx supabase deploy