name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-deploy:
    name: Build, Test & Deploy
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: redapro
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password 
      DB_NAME: redapro
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      TOKEN_GITHUB: ${{ secrets.TOKEN_GITHUB }}
      
      SUPABASE_REF: ${{ secrets.SUPABASE_REF }}
      SUPABASE_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres
        run: sleep 10

      - name: Run tests
        run: npm test -- --ci --runInBand

      - name: Build Docker image
        run: docker build -t redapro-backend:${{ github.sha }} .

      - name: Login no Supabase
        run: npx supabase login --token $SUPABASE_ACCESS_TOKEN

      - name: Login no Supabase
        run: npx supabase login --token $SUPABASE_ACCESS_TOKEN

      - name: Login no Supabase
        run: npx supabase login --token $SUPABASE_ACCESS_TOKEN

      - name: Link e Push
        run: |
          rm -rf supabase/.temp
          npx supabase link --project-ref "$SUPABASE_REF"
          npx supabase db push