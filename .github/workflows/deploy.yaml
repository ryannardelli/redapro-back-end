name: CD - Deploy to Supabase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build Docker image
        run: |
          docker build -t redapro-backend:${{ github.sha }} .

      - name: Deploy to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_SSL: ${{ secrets.DB_SSL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SECRET: ${{ secrets.SECRET }}
        run: |
          # Loga no Supabase CLI (você deve ter adicionado SUPABASE_KEY como secret)
          npx supabase login --service-role $SUPABASE_KEY

          # Faz deploy da aplicação (exemplo Node.js + Docker)
          npx supabase deploy